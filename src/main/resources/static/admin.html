<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员首页 - 医院信息管理系统</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="admin-page">
    <div class="admin-shell">
        <header class="topbar">
            <div>
                <strong>医院信息管理系统</strong>
                <span>Hospital Management Information System</span>
            </div>
            <div class="user-area">
                <span id="currentUser">未登录</span>
                <button id="logoutButton" type="button">退出</button>
            </div>
        </header>
        <aside class="sidebar">
            <div class="sidebar-title">功能菜单</div>
            <nav id="menuList" class="menu-list"></nav>
        </aside>
        <main class="content-panel">
            <section class="page-heading">
                <p>Admin Dashboard</p>
                <h1>管理员首页</h1>
                <span>维护医院基础资料，查看统计分析，保障业务数据完整。</span>
            </section>
            <section class="stats-grid">
                <article>
                    <span>基础资料维护</span>
                    <strong>6</strong>
                    <p>科室、医生、病人、药品、病房、病床信息管理。</p>
                </article>
                <article>
                    <span>业务监管</span>
                    <strong>4</strong>
                    <p>门诊、住院、费用与预缴数据统一查看。</p>
                </article>
                <article>
                    <span>统计分析</span>
                    <strong>3</strong>
                    <p>科室排班、医生工作量、病人治疗情况统计。</p>
                </article>
            </section>
            <section class="notice-card">
                <h2>常用入口</h2>
                <ul>
                    <li><a href="/departments">维护科室基本信息</a></li>
                    <li><a href="/doctors">维护医生基本信息</a></li>
                    <li><a href="/medicines">维护药品基本信息</a></li>
                    <li><a href="/statistics">查看统计分析</a></li>
                </ul>
            </section>
        </main>
        <footer class="footer">医院信息管理系统 © 2026</footer>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
