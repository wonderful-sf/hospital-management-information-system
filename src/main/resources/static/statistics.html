<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>统计分析 - 医院信息管理系统</title>
<link rel="stylesheet" href="/css/app.css">
<style>
.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--color-border)}
.tabs button{padding:10px 24px;border:0;background:none;cursor:pointer;font-size:14px;color:var(--color-muted);border-bottom:2px solid transparent;margin-bottom:-2px}
.tabs button.active{color:var(--color-primary);border-bottom-color:var(--color-primary);font-weight:700}
.tab-content{display:none}
.tab-content.active{display:block}
.filter-bar{display:flex;gap:12px;margin-bottom:18px;align-items:center;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:8px 12px;border:1px solid var(--color-border);border-radius:10px}
.filter-bar button{padding:8px 20px;border:0;border-radius:10px;background:var(--color-primary);color:#fff;cursor:pointer}
.bar-wrap{background:#f0f0f0;border-radius:4px;height:28px;margin:4px 0}
.bar-fill{height:28px;border-radius:4px;background:var(--color-primary);display:flex;align-items:center;padding-left:8px;color:#fff;font-size:12px;font-weight:700}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:768px){.summary-grid{grid-template-columns:1fr}}
</style>
</head>
<body class="admin-page">
<div class="admin-shell">
<header class="topbar">
<div><strong>医院信息管理系统</strong><span>Hospital Management Information System</span></div>
<div class="user-area"><span id="currentUser">未登录</span><button id="logoutButton" type="button">退出</button></div>
</header>
<aside class="sidebar">
<div class="sidebar-title">功能菜单</div>
<nav id="menuList" class="menu-list"></nav>
</aside>
<main class="content-panel">
<div class="page-heading"><p>Statistics</p><h1>统计分析</h1><span>科室排班 / 医生工作量 / 病人治疗统计</span></div>
<div class="tabs">
<button class="tab-btn active" data-tab="tab-dept">科室排班</button>
<button class="tab-btn" data-tab="tab-doctor">医生工作量</button>
<button class="tab-btn" data-tab="tab-patient">病人治疗</button>
</div>

<div id="tab-dept" class="tab-content active">
<div class="filter-bar"><label>开始<input type="date" id="ds"></label><label>结束<input type="date" id="de"></label><button id="dbtn">查询</button></div>
<table><thead><tr><th>科室</th><th>门诊排班</th><th>住院巡诊</th><th>合计</th><th>操作</th></tr></thead><tbody id="dtb"></tbody></table>
<div style="margin-top:20px"><h3>排班次数对比</h3><div id="dch"></div></div>
<div id="ddetail" style="margin-top:16px;display:none"><h4 id="ddt"></h4><table><thead><tr><th>医生</th><th>类型</th><th>开始</th><th>结束</th><th>房间</th></tr></thead><tbody id="ddtb"></tbody></table></div>
</div>

<div id="tab-doctor" class="tab-content">
<div class="filter-bar"><label>开始<input type="date" id="ws"></label><label>结束<input type="date" id="we"></label><label>科室<select id="wd"><option value="">全部</option></select></label><button id="wbtn">查询</button></div>
<table><thead><tr><th>医生</th><th>科室</th><th>门诊接诊</th><th>住院负责</th><th>处方数</th><th>处方总额(元)</th></tr></thead><tbody id="wtb"></tbody></table>
<div style="margin-top:20px"><h3>接诊量对比</h3><div id="wch"></div></div>
</div>

<div id="tab-patient" class="tab-content">
<div class="filter-bar"><label>开始<input type="date" id="ps"></label><label>结束<input type="date" id="pe"></label><button id="pbtn">查询</button></div>
<div class="summary-grid"><div><h3>门诊</h3><table><thead><tr><th>指标</th><th>数量</th></tr></thead><tbody id="ops"></tbody></table></div><div><h3>住院</h3><table><thead><tr><th>指标</th><th>数量</th></tr></thead><tbody id="ips"></tbody></table></div></div>
<h3>病人明细</h3>
<table><thead><tr><th>病人</th><th>病案号</th><th>门诊次数</th><th>住院次数</th><th>总费用(元)</th></tr></thead><tbody id="ptb"></tbody></table>
</div>
</main>
<footer class="footer">医院信息管理系统 &copy; 2026</footer>
</div>
<script src="/js/app.js"></script>
<script>
(function(){
var m=['01','02','03','04','05','06','07','08','09','10','11','12'];
var n=new Date();
var fd=n.getFullYear()+'-'+m[n.getMonth()]+'-01';
var ld=n.getFullYear()+'-'+m[n.getMonth()]+'-'+(new Date(n.getFullYear(),n.getMonth()+1,0).getDate());

function e(t){var d=document.createElement('div');d.textContent=t||'';return d.innerHTML}

document.querySelectorAll('.tab-btn').forEach(function(b){
b.addEventListener('click',function(){
document.querySelectorAll('.tab-btn,.tab-content').forEach(function(el){el.classList.remove('active');});
b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active');
});});

// Department schedule
document.getElementById('ds').value=fd;document.getElementById('de').value=ld;
document.getElementById('dbtn').addEventListener('click',lds);lds();
function lds(){
var s=document.getElementById('ds').value,ed=document.getElementById('de').value;
requestJson('/api/statistics/department-schedules?startDate='+s+'&endDate='+ed).then(function(r){
if(!r)return;var d=r.data||[],rows='',ch='',mx=0;
d.forEach(function(x){if(x.totalCount>mx)mx=x.totalCount;});
d.forEach(function(x){
var w=mx>0?Math.round(x.totalCount/mx*100):0;
rows+='<tr><td>'+e(x.departmentName)+'</td><td>'+x.outpatientCount+'</td><td>'+x.inpatientCount+'</td><td>'+x.totalCount+'</td><td><button onclick="showDeptDetail(\''+e(x.departmentName)+'\')">展开</button></td></tr>';
ch+='<div>'+e(x.departmentName)+' <span style="font-size:12px;color:var(--color-muted)">'+x.totalCount+'次</span><div class="bar-wrap"><div class="bar-fill" style="width:'+w+'%">'+x.totalCount+'</div></div></div>';
});
document.getElementById('dtb').innerHTML=rows||'<tr><td colspan="5">暂无数据</td></tr>';
document.getElementById('dch').innerHTML=ch||'<p>暂无数据</p>';
});}
window.showDeptDetail=function(name){
var s=document.getElementById('ds').value,ed=document.getElementById('de').value;
requestJson('/api/departments?keyword='+encodeURIComponent(name)).then(function(dr){
if(!dr||!dr.data||!dr.data.length)return;
requestJson('/api/statistics/department-schedules?startDate='+s+'&endDate='+ed+'&departmentId='+dr.data[0].id).then(function(r){
if(!r)return;var d=r.data||[],rows='';
d.forEach(function(x){rows+='<tr><td>'+e(x.doctorName)+'</td><td>'+e(x.scheduleType)+'</td><td>'+e(x.startTime)+'</td><td>'+e(x.endTime)+'</td><td>'+e(x.room||'')+'</td></tr>';});
document.getElementById('ddt').textContent=name+' 排班明细';
document.getElementById('ddtb').innerHTML=rows||'<tr><td colspan="5">无记录</td></tr>';
document.getElementById('ddetail').style.display='block';
});});};

// Doctor workload
document.getElementById('ws').value=fd;document.getElementById('we').value=ld;
requestJson('/api/departments').then(function(r){if(!r)return;(r.data||[]).forEach(function(x){document.getElementById('wd').innerHTML+='<option value="'+x.id+'">'+e(x.name)+'</option>';});});
document.getElementById('wbtn').addEventListener('click',lws);lws();
function lws(){
var s=document.getElementById('ws').value,ed=document.getElementById('we').value,di=document.getElementById('wd').value;
var p='startDate='+s+'&endDate='+ed;if(di)p+='&departmentId='+di;
requestJson('/api/statistics/doctor-workload?'+p).then(function(r){
if(!r)return;var d=r.data||[],rows='',ch='',mx=0;
d.forEach(function(x){if(x.visitCount>mx)mx=x.visitCount;});
d.forEach(function(x){
var w=mx>0?Math.round(x.visitCount/mx*100):0;
rows+='<tr><td>'+e(x.doctorName)+'</td><td>'+e(x.departmentName)+'</td><td>'+x.visitCount+'</td><td>'+x.admissionCount+'</td><td>'+x.prescriptionCount+'</td><td>'+Number(x.totalPrescriptionAmount).toFixed(2)+'</td></tr>';
ch+='<div>'+e(x.doctorName)+' <span style="font-size:12px;color:var(--color-muted)">'+x.visitCount+'次</span><div class="bar-wrap"><div class="bar-fill" style="width:'+w+'%">'+x.visitCount+'</div></div></div>';
});
document.getElementById('wtb').innerHTML=rows||'<tr><td colspan="6">暂无数据</td></tr>';
document.getElementById('wch').innerHTML=ch||'<p>暂无数据</p>';
});}

// Patient treatment
document.getElementById('ps').value=fd;document.getElementById('pe').value=ld;
document.getElementById('pbtn').addEventListener('click',lps);lps();
function lps(){
var s=document.getElementById('ps').value,ed=document.getElementById('pe').value;
requestJson('/api/statistics/outpatient-summary?startDate='+s+'&endDate='+ed).then(function(r){
if(!r)return;var d=r.data||{},rg=d.registrations||{},rx=d.prescriptions||{};
document.getElementById('ops').innerHTML=
'<tr><td>挂号总量</td><td>'+rg.t+'</td></tr><tr><td>已挂号</td><td>'+rg.r+'</td></tr><tr><td>已接诊</td><td>'+rg.v+'</td></tr><tr><td>已取消</td><td>'+rg.c+'</td></tr><tr><td>处方总量</td><td>'+rx.t+'</td></tr><tr><td>已支付</td><td>'+rx.p+'</td></tr><tr><td>未支付</td><td>'+rx.u+'</td></tr><tr><td>处方总额(元)</td><td>'+Number(rx.amt).toFixed(2)+'</td></tr>';
});
requestJson('/api/statistics/inpatient-summary').then(function(r){
if(!r)return;var d=r.data||{},st=d.status||{},rc=d.records||{};
document.getElementById('ips').innerHTML=
'<tr><td>在院人数</td><td>'+st.a+'</td></tr><tr><td>已出院</td><td>'+st.d+'</td></tr><tr><td>暂停治疗</td><td>'+st.s+'</td></tr><tr><td>住院总人次</td><td>'+st.t+'</td></tr><tr><td>近30天记录数</td><td>'+rc.recordCount+'</td></tr><tr><td>近30天费用(元)</td><td>'+Number(rc.totalCost).toFixed(2)+'</td></tr>';
});
requestJson('/api/statistics/patient-detail?startDate='+s+'&endDate='+ed).then(function(r){
if(!r)return;var d=r.data||[],rows='';
d.forEach(function(x){rows+='<tr><td>'+e(x.name)+'</td><td>'+e(x.medicalRecordNo)+'</td><td>'+x.outpatientCount+'</td><td>'+x.admissionCount+'</td><td>'+Number(x.totalCost).toFixed(2)+'</td></tr>';});
document.getElementById('ptb').innerHTML=rows||'<tr><td colspan="5">暂无数据</td></tr>';
});
}
})();
</script>
</body>
</html>
