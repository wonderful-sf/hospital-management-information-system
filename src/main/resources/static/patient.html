<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病人首页 - 医院信息管理系统</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="admin-page">
    <div class="admin-shell">
        <header class="topbar">
            <div>
                <strong>医院信息管理系统</strong>
                <span>Hospital Management Information System</span>
            </div>
            <div class="user-area">
                <span id="currentUser">未登录</span>
                <button id="logoutButton" type="button">退出</button>
            </div>
        </header>
        <aside class="sidebar">
            <div class="sidebar-title">功能菜单</div>
            <nav id="menuList" class="menu-list"></nav>
        </aside>
        <main class="content-panel">
            <section class="page-heading">
                <p>Patient Portal</p>
                <h1>病人首页</h1>
                <span>完成挂号、缴费，查询自己的就诊记录和费用明细。</span>
            </section>
            <section class="stats-grid">
                <article>
                    <span>挂号就诊</span>
                    <strong>1</strong>
                    <p>选择医生排班并发起挂号，查看就诊进度。</p>
                </article>
                <article>
                    <span>费用缴纳</span>
                    <strong>2</strong>
                    <p>查看账单明细，完成模拟支付和住院预缴。</p>
                </article>
                <article>
                    <span>记录查询</span>
                    <strong>3</strong>
                    <p>查询门诊处方、住院档案与费用明细。</p>
                </article>
            </section>
            <section class="notice-card">
                <h2>使用说明</h2>
                <ul>
                    <li>左侧菜单会按当前病人账号权限显示可操作功能。</li>
                    <li>病人可进行挂号、住院预缴和账单缴费。</li>
                    <li>病人可查询自己的就诊记录、住院档案和费用明细。</li>
                </ul>
            </section>
        </main>
        <footer class="footer">医院信息管理系统 © 2026</footer>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
