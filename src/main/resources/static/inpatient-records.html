<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>住院记录管理</title><link rel="stylesheet" href="/css/app.css"><style>.ly{display:grid;grid-template-columns:280px 1fr;gap:20px;min-height:70vh}@media(max-width:768px){.ly{grid-template-columns:1fr}}.pl{background:var(--color-panel);border-radius:14px;padding:16px;box-shadow:0 4px 16px rgba(28,67,88,0.06)}.pl h4{margin:0 0 12px}.pl .it{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:6px;border:1px solid var(--color-border)}.pl .it:hover{background:#f0f6fa}.pl .it.sel{border-color:var(--color-primary);background:#e8f4f8}.md-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);place-items:center;z-index:100}.md-overlay.open{display:grid}.md-card{width:min(640px,92vw);padding:28px;border-radius:20px;background:#fff;box-shadow:var(--shadow-card);max-height:90vh;overflow-y:auto}.md-card h2{margin:0 0 16px}.md-card label{display:grid;gap:6px;margin-bottom:12px;font-weight:700}.md-card input,.md-card select,.md-card textarea{padding:10px 12px;border:1px solid var(--color-border);border-radius:10px;outline:none}.md-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}.md-actions button{padding:10px 20px;border:0;border-radius:12px;cursor:pointer}.md-actions .btn-save{color:#fff;background:var(--color-primary)}.md-actions .btn-cancel{background:#f0f0f0}.ir{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}.ir select,.ir input{padding:8px;border:1px solid var(--color-border);border-radius:8px}.ir select{min-width:140px}.ir input{width:80px}</style></head>
<body class="admin-page"><div class="admin-shell">
<header class="topbar"><div><strong>医院信息管理系统</strong><span>HMIS</span></div><div class="user-area"><span id="currentUser"></span><button id="logoutButton">退出</button></div></header>
<aside class="sidebar"><div class="sidebar-title">功能菜单</div><nav id="menuList" class="menu-list"></nav></aside>
<main class="content-panel"><div class="page-heading"><p>Inpatient</p><h1>住院记录管理</h1><span>每日巡诊记录与费用</span></div>
<div class="ly"><div class="pl"><h4>我的住院病人</h4><div id="plist"></div></div><div class="pr"><h3 id="pttl">请选择左侧病人</h3><button id="abtn" style="display:none;margin-bottom:16px;padding:8px 20px;border:0;border-radius:10px;background:var(--color-primary);color:#fff;cursor:pointer">新增每日记录</button><table><thead><tr><th>日期</th><th>病情</th><th>方案</th><th>治疗费</th><th>总费用</th><th>时间</th></tr></thead><tbody id="rtb"></tbody></table></div></div></main>
<footer class="footer">医院信息管理系统 &copy; 2026</footer></div>
<div class="md-overlay" id="md"><div class="md-card"><h2 id="mt">新增每日记录</h2><form id="mf"><input type="hidden" id="aid"><label>记录日期<input type="date" id="fdt" required></label><label>病情描述<textarea id="fcd" rows="3" required></textarea></label><label>诊疗方案摘要<textarea id="fts" rows="3" required></textarea></label><label>当日治疗费(元)<input id="ftf" type="number" step="0.01" value="0" required></label><div style="margin:12px 0"><strong>用药明细</strong><div id="mc"></div><button type="button" id="addM" style="margin-top:4px;padding:6px 14px;border:1px dashed var(--color-primary);border-radius:8px;background:none;color:var(--color-primary);cursor:pointer">+ 添加药品</button></div><div style="margin:12px 0"><strong>治疗项目明细</strong><div id="tc"></div><button type="button" id="addT" style="margin-top:4px;padding:6px 14px;border:1px dashed var(--color-primary);border-radius:8px;background:none;color:var(--color-primary);cursor:pointer">+ 添加项目</button></div><div class="md-actions"><button type="button" class="btn-cancel" id="cb">取消</button><button type="submit" class="btn-save">保存</button></div></form></div></div>
<script src="/js/app.js"></script><script>
(function(){var A='/api/inpatient-records',AA='/api/admissions';function x(t){var d=document.createElement('div');d.textContent=t||'';return d.innerHTML}
var sa=null,meds=[];
requestJson('/api/medicines').then(function(r){meds=r?r.data||[]:[];});

function lp(){requestJson(AA).then(function(r){if(!r)return;var d=r.data||[],h='';d.forEach(function(v){h+='<div class="it" onclick="sp('+v.id+')" id="pi'+v.id+'">'+x(v.admissionNo)+'<br><small>'+x(v.patientName||'')+' 余额:'+Number(v.prepaidBalance).toFixed(2)+'</small></div>';});document.getElementById('plist').innerHTML=h||'<p>无病人</p>';});}
window.sp=function(id){sa=id;document.querySelectorAll('.pl .it').forEach(function(el){el.classList.remove('sel');});document.getElementById('pi'+id).classList.add('sel');lr();document.getElementById('abtn').style.display='inline-block';};
function lr(){if(!sa)return;requestJson(AA).then(function(r){if(!r)return;var d=r.data||[],a=null;d.forEach(function(v){if(v.id===sa)a=v;});if(!a)return;document.getElementById('pttl').textContent=a.admissionNo+' - '+x(a.patientName||'')+' (余额:'+Number(a.prepaidBalance).toFixed(2)+'元)';});requestJson(A+'?admissionId='+sa).then(function(r){if(!r)return;var d=r.data||[],rows='';d.forEach(function(v){rows+='<tr><td>'+x(v.recordDate)+'</td><td>'+x(v.conditionDescription)+'</td><td>'+x(v.treatmentSummary)+'</td><td>'+Number(v.treatmentFee).toFixed(2)+'</td><td>'+Number(v.totalFee||0).toFixed(2)+'</td><td>'+x(v.createdAt)+'</td></tr>';});document.getElementById('rtb').innerHTML=rows||'<tr><td colspan="6">暂无记录</td></tr>';});}
function mr(){return'<div class="ir"><select class="ms"><option value="">选药品</option>'+meds.map(function(m){return'<option value="'+m.id+'">'+x(m.name)+' ('+Number(m.unitPrice).toFixed(2)+'元)</option>';}).join('')+'</select><input type="number" class="mq" value="1" min="1"><input type="text" class="mu" placeholder="用法"><span class="msu" style="font-size:12px;color:var(--color-muted)">0.00</span></div>';}
function trr(){return'<div class="ir"><input type="text" class="tn" placeholder="项目名称" style="width:120px"><input type="number" class="tp" step="0.01" placeholder="单价" style="width:70px"><input type="number" class="tq" value="1" min="1" style="width:60px"><span class="ts" style="font-size:12px;color:var(--color-muted)">0.00</span></div>';}
document.getElementById('addM').addEventListener('click',function(){var c=document.getElementById('mc'),r=document.createElement('div');r.innerHTML=mr();c.appendChild(r);});
document.getElementById('addT').addEventListener('click',function(){var c=document.getElementById('tc'),r=document.createElement('div');r.innerHTML=trr();c.appendChild(r);});
document.getElementById('abtn').addEventListener('click',function(){document.getElementById('aid').value=sa;document.getElementById('fdt').value=new Date().toISOString().split('T')[0];document.getElementById('fcd').value='';document.getElementById('fts').value='';document.getElementById('ftf').value='0';document.getElementById('mc').innerHTML='';document.getElementById('tc').innerHTML='';document.getElementById('mt').textContent='新增每日记录';document.getElementById('md').classList.add('open');});
document.getElementById('cb').addEventListener('click',function(){document.getElementById('md').classList.remove('open');});
document.getElementById('mf').addEventListener('submit',function(ev){ev.preventDefault();var its=[];document.querySelectorAll('#mc .ir').forEach(function(r){var s=r.querySelector('.ms').value,q=parseInt(r.querySelector('.mq').value)||1,u=r.querySelector('.mu').value;if(s)its.push({itemType:'MEDICINE',medicineId:parseInt(s),quantity:q,usageInstruction:u});});document.querySelectorAll('#tc .ir').forEach(function(r){var n=r.querySelector('.tn').value,p=parseFloat(r.querySelector('.tp').value)||0,q=parseInt(r.querySelector('.tq').value)||1;if(n)its.push({itemType:'TREATMENT',itemName:n,unitPrice:p,quantity:q});});var p={admissionId:parseInt(document.getElementById('aid').value),recordDate:document.getElementById('fdt').value,conditionDescription:document.getElementById('fcd').value,treatmentSummary:document.getElementById('fts').value,treatmentFee:parseFloat(document.getElementById('ftf').value)||0,items:its};requestJson(A,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}).then(function(r){if(r){document.getElementById('md').classList.remove('open');setPageSuccess('记录保存成功。');lr();lp();}});});
lp();})();</script></body></html>
