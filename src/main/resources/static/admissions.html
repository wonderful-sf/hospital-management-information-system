<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>住院档案管理</title><link rel="stylesheet" href="/css/app.css"><style>.filter-bar{display:flex;gap:12px;margin-bottom:18px;align-items:center;flex-wrap:wrap}.filter-bar input,.filter-bar select{padding:8px 12px;border:1px solid var(--color-border);border-radius:10px}.filter-bar button{padding:8px 20px;border:0;border-radius:10px;background:var(--color-primary);color:#fff;cursor:pointer}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);place-items:center;z-index:100}.modal-overlay.open{display:grid}.modal-card{width:min(560px,92vw);padding:28px;border-radius:20px;background:#fff;box-shadow:var(--shadow-card);max-height:90vh;overflow-y:auto}.modal-card h2{margin:0 0 20px}.modal-card label{display:grid;gap:6px;margin-bottom:14px;font-weight:700}.modal-card input,.modal-card select{padding:10px 12px;border:1px solid var(--color-border);border-radius:10px;outline:none}.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}.modal-actions button{padding:10px 20px;border:0;border-radius:12px;cursor:pointer}.modal-actions .btn-save{color:#fff;background:var(--color-primary)}.modal-actions .btn-cancel{background:#f0f0f0}.tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:700}.ta{background:#dcfce7;color:#166534}.ts{background:#fff3cd;color:#856404}.td{background:#f0f0f0;color:#888}</style></head>
<body class="admin-page"><div class="admin-shell">
<header class="topbar"><div><strong>医院信息管理系统</strong><span>HMIS</span></div><div class="user-area"><span id="currentUser"></span><button id="logoutButton">退出</button></div></header>
<aside class="sidebar"><div class="sidebar-title">功能菜单</div><nav id="menuList" class="menu-list"></nav></aside>
<main class="content-panel"><div class="page-heading"><p>Inpatient</p><h1>住院档案管理</h1><span>建档、分配病床、出院结算</span></div>
<div class="filter-bar"><input id="kw" placeholder="搜索病人"><select id="fs"><option value="">全部状态</option><option value="ACTIVE">在院</option><option value="SUSPENDED">暂停</option><option value="DISCHARGED">已出院</option></select><button id="sb">搜索</button><button id="ab">新增住院</button></div>
<table><thead><tr><th>住院号</th><th>病人</th><th>科室</th><th>主治医生</th><th>病床</th><th>入院时间</th><th>余额</th><th>状态</th><th>操作</th></tr></thead><tbody id="tb"></tbody></table>
</main><footer class="footer">医院信息管理系统 &copy; 2026</footer></div>
<div class="modal-overlay" id="md"><div class="modal-card"><h2 id="mt">新增住院</h2><form id="mf"><input type="hidden" id="eid"><label>病人<select id="fp" required><option value="">请选择</option></select></label><label>科室<select id="fd" required><option value="">请选择科室</option></select></label><label>主治医生<select id="fa" required><option value="">请先选科室</option></select></label><label>病床<select id="fb"><option value="">暂不分配</option></select></label><label>预缴金额(元)<input id="fm" type="number" min="500" value="500" required></label><div class="modal-actions"><button type="button" class="btn-cancel" id="cb">取消</button><button type="submit" class="btn-save">保存</button></div></form></div></div>
<script src="/js/app.js"></script><script>
(function(){var A='/api/admissions';function x(t){var d=document.createElement('div');d.textContent=t||'';return d.innerHTML}function tag(s){var m={ACTIVE:'ta',SUSPENDED:'ts',DISCHARGED:'td'},n={ACTIVE:'在院',SUSPENDED:'暂停',DISCHARGED:'已出院'};return'<span class="tag '+m[s]+'">'+n[s]+'</span>'}
function ld(){var p='',kw=document.getElementById('kw').value.trim(),fs=document.getElementById('fs').value;if(kw)p+='&keyword='+encodeURIComponent(kw);if(fs)p+='&status='+fs;requestJson(A+(p?'?'+p.slice(1):'')).then(function(r){if(!r)return;var d=r.data||[],rows='';d.forEach(function(v){rows+='<tr><td>'+x(v.admissionNo)+'</td><td>'+x(v.patientName||'')+'</td><td>'+x(v.departmentName||'')+'</td><td>'+x(v.doctorName||'')+'</td><td>'+x(v.bedNo||'未分配')+'</td><td>'+x(v.admittedAt)+'</td><td>'+Number(v.prepaidBalance).toFixed(2)+'</td><td>'+tag(v.status)+'</td><td>'+(v.status==='ACTIVE'?'<button onclick="editA('+v.id+')">编辑</button><button onclick="disA('+v.id+')">出院</button>':'')+'</td></tr>';});document.getElementById('tb').innerHTML=rows||'<tr><td colspan="9">暂无数据</td></tr>';});}
var pts=[],dps=[],drs=[],bds=[];
function lr(){requestJson('/api/patients').then(function(r){pts=r?r.data||[]:[];ro('fp',pts);});requestJson('/api/departments').then(function(r){dps=r?r.data||[]:[];ro('fd',dps);});requestJson('/api/doctors').then(function(r){drs=r?r.data||[]:[];});requestJson('/api/beds').then(function(r){bds=r?r.data||[]:[];});}
function ro(id,list){var s=document.getElementById(id),o='<option value="">请选择</option>';list.forEach(function(v){o+='<option value="'+v.id+'">'+x(v.name||v.bedNo||v.id)+'</option>';});s.innerHTML=o;}
function rd(deptId,sel){var s=document.getElementById('fa'),o='<option value="">请选择</option>';drs.filter(function(v){return v.departmentId==deptId;}).forEach(function(v){o+='<option value="'+v.id+'"'+(sel==v.id?' selected':'')+'>'+x(v.name)+'</option>';});s.innerHTML=o||'<option value="">该科室无医生</option>';}
function rb(deptId,sel){var s=document.getElementById('fb'),o='<option value="">暂不分配</option>';bds.filter(function(v){return v.departmentId==deptId&&v.status==='AVAILABLE';}).forEach(function(v){o+='<option value="'+v.id+'"'+(sel==v.id?' selected':'')+'>'+x(v.wardName||v.bedNo||v.id)+'</option>';});s.innerHTML=o;}
document.getElementById('fd').addEventListener('change',function(){rd(this.value);rb(this.value);});
function openM(title,data){clearPageMessage();document.getElementById('mt').textContent=title;document.getElementById('eid').value=data?data.id:'';lr();setTimeout(function(){if(data){ro('fd',dps);rd(data.departmentId,data.attendingDoctorId);rb(data.departmentId,data.bedId);}document.getElementById('fp').value=data?data.patientId:'';document.getElementById('fd').value=data?data.departmentId:'';document.getElementById('fm').value=data?data.prepaidBalance:'500';},200);document.getElementById('md').classList.add('open');}
window.editA=function(id){requestJson(A).then(function(r){if(!r)return;(r.data||[]).forEach(function(v){if(v.id===id)openM('编辑住院档案',v);});});};
window.disA=function(id){if(!confirm('确认办理出院？'))return;requestJson(A+'/'+id+'/discharge',{method:'POST'}).then(function(r){if(r){setPageSuccess('出院结算完成。');ld();}});};
document.getElementById('sb').addEventListener('click',ld);document.getElementById('ab').addEventListener('click',function(){openM('新增住院');});document.getElementById('cb').addEventListener('click',function(){document.getElementById('md').classList.remove('open');});
document.getElementById('mf').addEventListener('submit',function(ev){ev.preventDefault();var id=document.getElementById('eid').value;var p={patientId:parseInt(document.getElementById('fp').value),departmentId:parseInt(document.getElementById('fd').value),attendingDoctorId:parseInt(document.getElementById('fa').value),initialDeposit:parseFloat(document.getElementById('fm').value)};var bid=document.getElementById('fb').value;if(bid)p.bedId=parseInt(bid);var u=id?A+'/'+id:A,m=id?'PUT':'POST';requestJson(u,{method:m,headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}).then(function(r){if(r){document.getElementById('md').classList.remove('open');document.getElementById('mf').reset();setPageSuccess(id?'档案更新成功。':'住院建档成功。');ld();}});});
lr();ld();})();</script></body></html>
