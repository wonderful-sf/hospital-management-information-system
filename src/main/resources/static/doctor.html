<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生首页 - 医院信息管理系统</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="admin-page">
    <div class="admin-shell">
        <header class="topbar">
            <div>
                <strong>医院信息管理系统</strong>
                <span>Hospital Management Information System</span>
            </div>
            <div class="user-area">
                <span id="currentUser">未登录</span>
                <button id="logoutButton" type="button">退出</button>
            </div>
        </header>
        <aside class="sidebar">
            <div class="sidebar-title">功能菜单</div>
            <nav id="menuList" class="menu-list"></nav>
        </aside>
        <main class="content-panel">
            <section class="page-heading">
                <p>Doctor Workspace</p>
                <h1>医生首页</h1>
                <span>查看个人排班，完成接诊记录，按病情开具处方。</span>
            </section>
            <section class="stats-grid">
                <article>
                    <span>排班查看</span>
                    <strong>1</strong>
                    <p>查看自己的门诊与住院查房排班情况。</p>
                </article>
                <article>
                    <span>接诊病人</span>
                    <strong>2</strong>
                    <p>处理挂号病人，登记症状、诊断与治疗记录。</p>
                </article>
                <article>
                    <span>处方管理</span>
                    <strong>3</strong>
                    <p>支持开具处方，也支持纯诊疗不开药。</p>
                </article>
            </section>
            <section class="notice-card">
                <h2>工作说明</h2>
                <ul>
                    <li>左侧菜单会按当前医生账号权限显示可操作功能。</li>
                    <li>医生可查看自己的排班情况，完成接诊记录。</li>
                    <li>医生可根据诊断结果开具处方或维护住院记录。</li>
                </ul>
            </section>
        </main>
        <footer class="footer">医院信息管理系统 © 2026</footer>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
