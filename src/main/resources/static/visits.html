<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就诊管理 - 医院信息管理系统</title>
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .toolbar { display: flex; gap: 12px; margin-bottom: 18px; align-items: center; }
        .toolbar input, .toolbar select { padding: 10px 14px; border: 1px solid var(--color-border); border-radius: 12px; outline: none; }
        .toolbar input:focus, .toolbar select:focus { border-color: var(--color-primary); }
        .toolbar button { padding: 10px 20px; border: 0; border-radius: 12px; color: #fff; background: var(--color-primary); cursor: pointer; }
        .toolbar button:hover { background: var(--color-primary-dark); }
        table { width: 100%; border-collapse: collapse; background: var(--color-panel); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 24px rgba(28,67,88,0.06); }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--color-border); }
        th { background: #f0f6fa; font-weight: 700; font-size: 13px; color: var(--color-muted); }
        td button { padding: 6px 12px; margin-right: 6px; border: 1px solid var(--color-border); border-radius: 8px; background: #fff; cursor: pointer; }
        td button:hover { background: #f0f6fa; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); place-items: center; z-index: 100; }
        .modal-overlay.open { display: grid; }
        .modal-card { width: min(520px, 92vw); padding: 28px; border-radius: 20px; background: #fff; box-shadow: var(--shadow-card); }
        .modal-card h2 { margin: 0 0 20px; }
        .modal-card label { display: grid; gap: 6px; margin-bottom: 14px; font-weight: 700; }
        .modal-card input, .modal-card select, .modal-card textarea { padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 10px; outline: none; }
        .modal-card input:focus, .modal-card select:focus, .modal-card textarea:focus { border-color: var(--color-primary); }
        .modal-card textarea { resize: vertical; min-height: 60px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
        .modal-actions button { padding: 10px 20px; border: 0; border-radius: 12px; cursor: pointer; }
        .modal-actions .btn-save { color: #fff; background: var(--color-primary); }
        .modal-actions .btn-save:hover { background: var(--color-primary-dark); }
        .modal-actions .btn-cancel { background: #f0f0f0; }
        .pagination { margin-top: 14px; color: var(--color-muted); font-size: 13px; }
    </style>
</head>
<body class="admin-page">
<div class="admin-shell">
    <header class="topbar">
        <div><strong>医院信息管理系统</strong><span>Hospital Management Information System</span></div>
        <div class="user-area"><span id="currentUser">未登录</span><button id="logoutButton" type="button">退出</button></div>
    </header>
    <aside class="sidebar">
        <div class="sidebar-title">功能菜单</div>
        <nav id="menuList" class="menu-list"></nav>
    </aside>
    <main class="content-panel">
        <div class="page-heading"><p>Outpatient</p><h1>就诊管理</h1><span>管理门诊就诊记录</span></div>
        <div class="toolbar" style="margin-top:24px">
            <input id="filterDoctorId" placeholder="医生ID..." style="width:120px" />
            <input id="filterPatientId" placeholder="病人ID..." style="width:120px" />
            <button id="searchBtn">筛选</button>
            <button id="addBtn">新增就诊</button>
        </div>
        <table><thead><tr><th>ID</th><th>挂号ID</th><th>病人ID</th><th>医生ID</th><th>症状描述</th><th>诊断</th><th>就诊时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table>
        <div class="pagination" id="pagination"></div>
    </main>
    <footer class="footer">医院信息管理系统 &copy; 2026</footer>
</div>
<div class="modal-overlay" id="modal">
    <div class="modal-card">
        <h2 id="modalTitle">新增就诊</h2>
        <form id="modalForm">
            <input type="hidden" id="editId" />
            <label>挂号ID<input id="formRegistrationId" type="number" required /></label>
            <label>病人ID<input id="formPatientId" type="number" required /></label>
            <label>医生ID<input id="formDoctorId" type="number" required /></label>
            <label>症状描述<textarea id="formSymptomDescription"></textarea></label>
            <label>诊断<textarea id="formDiagnosis"></textarea></label>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="cancelBtn">取消</button>
                <button type="submit" class="btn-save">保存</button>
            </div>
        </form>
    </div>
</div>
<script src="/js/app.js"></script>
<script>
(function() {
var API = '/api/visits';

function loadData() {
    var doctorId = document.getElementById('filterDoctorId').value.trim();
    var patientId = document.getElementById('filterPatientId').value.trim();
    var params = [];
    if (doctorId) params.push('doctorId=' + encodeURIComponent(doctorId));
    if (patientId) params.push('patientId=' + encodeURIComponent(patientId));
    var url = API + (params.length ? '?' + params.join('&') : '');
    requestJson(url).then(function(result) {
        if (!result) return;
        var data = result.data || [];
        var rows = '';
        for (var i = 0; i < data.length; i++) {
            var d = data[i];
            rows += '<tr><td>' + d.id + '</td><td>' + d.registrationId + '</td><td>' + d.patientId + '</td><td>' + d.doctorId + '</td><td>' + esc(d.symptomDescription||'') + '</td><td>' + esc(d.diagnosis||'') + '</td><td>' + (d.visitedAt||'') + '</td><td><button onclick="editVisit(' + d.id + ')">编辑</button></td></tr>';
        }
        document.getElementById('tableBody').innerHTML = rows || '<tr><td colspan="8">暂无数据</td></tr>';
        document.getElementById('pagination').textContent = '共 ' + data.length + ' 条';
    });
}

function esc(text) { var d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }

function openModal(title, data) {
    clearPageMessage();
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('editId').value = data ? data.id : '';
    document.getElementById('formRegistrationId').value = data ? data.registrationId : '';
    document.getElementById('formPatientId').value = data ? data.patientId : '';
    document.getElementById('formDoctorId').value = data ? data.doctorId : '';
    document.getElementById('formSymptomDescription').value = data ? data.symptomDescription || '' : '';
    document.getElementById('formDiagnosis').value = data ? data.diagnosis || '' : '';
    document.getElementById('modal').classList.add('open');
}

window.editVisit = function(id) {
    requestJson(API).then(function(result) {
        if (!result) return;
        var data = result.data || [];
        for (var i = 0; i < data.length; i++) {
            if (data[i].id === id) { openModal('编辑就诊', data[i]); return; }
        }
    });
};

document.getElementById('searchBtn').addEventListener('click', loadData);
document.getElementById('addBtn').addEventListener('click', function() { openModal('新增就诊'); });
document.getElementById('cancelBtn').addEventListener('click', function() { document.getElementById('modal').classList.remove('open'); });

document.getElementById('modalForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var id = document.getElementById('editId').value;
    var payload = {
        registrationId: parseInt(document.getElementById('formRegistrationId').value),
        patientId: parseInt(document.getElementById('formPatientId').value),
        doctorId: parseInt(document.getElementById('formDoctorId').value),
        symptomDescription: document.getElementById('formSymptomDescription').value,
        diagnosis: document.getElementById('formDiagnosis').value
    };
    var url = id ? API + '/' + id : API;
    var options = { method: id ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) };
    requestJson(url, options).then(function(result) {
        if (result) {
            document.getElementById('modal').classList.remove('open');
            document.getElementById('modalForm').reset();
            setPageSuccess(id ? '就诊更新成功。' : '就诊新增成功。');
            loadData();
        }
    });
});
loadData();
})();
</script>
</body>
</html>
