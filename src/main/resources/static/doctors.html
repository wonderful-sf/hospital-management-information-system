<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医生管理 - 医院信息管理系统</title>
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .toolbar { display: flex; gap: 12px; margin-bottom: 18px; align-items: center; }
        .toolbar input { flex: 1; padding: 10px 14px; border: 1px solid var(--color-border); border-radius: 12px; outline: none; }
        .toolbar input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(18,106,138,0.12); }
        .toolbar button { padding: 10px 20px; border: 0; border-radius: 12px; color: #fff; background: var(--color-primary); cursor: pointer; }
        .toolbar button:hover { background: var(--color-primary-dark); }
        table { width: 100%; border-collapse: collapse; background: var(--color-panel); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 24px rgba(28,67,88,0.06); }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--color-border); }
        th { background: #f0f6fa; font-weight: 700; font-size: 13px; color: var(--color-muted); }
        td button { padding: 6px 12px; margin-right: 6px; border: 1px solid var(--color-border); border-radius: 8px; background: #fff; cursor: pointer; }
        td button:hover { background: #f0f6fa; }
        td button.danger { color: #b42318; border-color: #fecaca; }
        td button.danger:hover { background: #fef2f2; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); place-items: center; z-index: 100; }
        .modal-overlay.open { display: grid; }
        .modal-card { width: min(480px, 92vw); padding: 28px; border-radius: 20px; background: #fff; box-shadow: var(--shadow-card); }
        .modal-card h2 { margin: 0 0 20px; }
        .modal-card label { display: grid; gap: 6px; margin-bottom: 14px; font-weight: 700; }
        .modal-card input, .modal-card select { padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 10px; outline: none; }
        .modal-card input:focus, .modal-card select:focus { border-color: var(--color-primary); }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
        .modal-actions button { padding: 10px 20px; border: 0; border-radius: 12px; cursor: pointer; }
        .modal-actions .btn-save { color: #fff; background: var(--color-primary); }
        .modal-actions .btn-save:hover { background: var(--color-primary-dark); }
        .modal-actions .btn-cancel { background: #f0f0f0; }
        .pagination { margin-top: 14px; color: var(--color-muted); font-size: 13px; }
    </style>
</head>
<body class="admin-page">
<div class="admin-shell">
    <header class="topbar">
        <div><strong>医院信息管理系统</strong><span>Hospital Management Information System</span></div>
        <div class="user-area"><span id="currentUser">未登录</span><button id="logoutButton" type="button">退出</button></div>
    </header>
    <aside class="sidebar">
        <div class="sidebar-title">功能菜单</div>
        <nav id="menuList" class="menu-list"></nav>
    </aside>
    <main class="content-panel">
        <div class="page-heading"><p>Basic Data</p><h1>医生管理</h1><span>管理医生信息</span></div>
        <div class="toolbar" style="margin-top:24px">
            <input id="searchInput" placeholder="搜索医生姓名..." />
            <button id="searchBtn">搜索</button>
            <button id="addBtn">新增医生</button>
        </div>
        <table><thead><tr><th>ID</th><th>工号</th><th>姓名</th><th>性别</th><th>科室ID</th><th>职称ID</th><th>电话</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table>
        <div class="pagination" id="pagination"></div>
    </main>
    <footer class="footer">医院信息管理系统 &copy; 2026</footer>
</div>
<div class="modal-overlay" id="modal">
    <div class="modal-card">
        <h2 id="modalTitle">新增医生</h2>
        <form id="modalForm">
            <input type="hidden" id="editId" />
            <label>工号<input id="formEmployeeNo" required /></label>
            <label>姓名<input id="formName" required /></label>
            <label>性别<select id="formGender"><option value="MALE">男</option><option value="FEMALE">女</option></select></label>
            <label>科室ID<input id="formDepartmentId" type="number" required /></label>
            <label>职称ID<input id="formTitleId" type="number" required /></label>
            <label>电话<input id="formPhone" /></label>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="cancelBtn">取消</button>
                <button type="submit" class="btn-save">保存</button>
            </div>
        </form>
    </div>
</div>
<script src="/js/app.js"></script>
<script>
(function() {
var API = '/api/doctors';
var keyword = '';

function loadData() {
    var params = keyword ? '?keyword=' + encodeURIComponent(keyword) : '';
    requestJson(API + params).then(function(result) {
        if (!result) return;
        var data = result.data || [];
        var rows = '';
        for (var i = 0; i < data.length; i++) {
            var d = data[i];
            rows += '<tr><td>' + d.id + '</td><td>' + esc(d.employeeNo) + '</td><td>' + esc(d.name) + '</td><td>' + (d.gender === 'MALE' ? '男' : '女') + '</td><td>' + d.departmentId + '</td><td>' + d.titleId + '</td><td>' + esc(d.phone||'') + '</td><td><button onclick="editDoctor(' + d.id + ')">编辑</button><button class="danger" onclick="delDoctor(' + d.id + ')">删除</button></td></tr>';
        }
        document.getElementById('tableBody').innerHTML = rows;
        document.getElementById('pagination').textContent = '共 ' + data.length + ' 条';
    });
}

function esc(text) { var d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }

function openModal(title, data) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('editId').value = data ? data.id : '';
    document.getElementById('formEmployeeNo').value = data ? data.employeeNo : '';
    document.getElementById('formName').value = data ? data.name : '';
    document.getElementById('formGender').value = data ? data.gender : 'MALE';
    document.getElementById('formDepartmentId').value = data ? data.departmentId : '';
    document.getElementById('formTitleId').value = data ? data.titleId : '';
    document.getElementById('formPhone').value = data ? data.phone || '' : '';
    document.getElementById('modal').classList.add('open');
}

window.editDoctor = function(id) {
    requestJson(API).then(function(result) {
        if (!result) return;
        var data = result.data || [];
        for (var i = 0; i < data.length; i++) {
            if (data[i].id === id) { openModal('编辑医生', data[i]); return; }
        }
    });
};

window.delDoctor = function(id) {
    if (!confirm('确认删除该医生？')) return;
    requestJson(API + '/' + id, { method: 'DELETE' }).then(function(result) {
        if (result) loadData();
    });
};

document.getElementById('searchBtn').addEventListener('click', function() { keyword = document.getElementById('searchInput').value.trim(); loadData(); });
document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') { keyword = e.target.value.trim(); loadData(); } });
document.getElementById('addBtn').addEventListener('click', function() { openModal('新增医生'); });
document.getElementById('cancelBtn').addEventListener('click', function() { document.getElementById('modal').classList.remove('open'); });

document.getElementById('modalForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var id = document.getElementById('editId').value;
    var payload = {
        employeeNo: document.getElementById('formEmployeeNo').value,
        name: document.getElementById('formName').value,
        gender: document.getElementById('formGender').value,
        departmentId: parseInt(document.getElementById('formDepartmentId').value),
        titleId: parseInt(document.getElementById('formTitleId').value),
        phone: document.getElementById('formPhone').value
    };
    var url = id ? API + '/' + id : API;
    var options = { method: id ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) };
    requestJson(url, options).then(function(result) {
        if (result) { document.getElementById('modal').classList.remove('open'); loadData(); }
    });
});
})();
</script>
</body>
</html>
